<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#2481cc" />
    <title>Finio - Управление финансами</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 Finio</h1>
            <p id="user-info">Загрузка...</p>
        </div>
        
        <div id="stats" class="stats" style="display: none;">
            <div class="stat-card">
                <h3>💰 Доходы</h3>
                <div id="income" class="value income">0 ₽</div>
            </div>
            <div class="stat-card">
                <h3>💸 Расходы</h3>
                <div id="expense" class="value expense">0 ₽</div>
            </div>
            <div class="stat-card">
                <h3>💳 Баланс</h3>
                <div id="balance" class="value">0 ₽</div>
            </div>
            <div class="stat-card">
                <h3>📊 Операций</h3>
                <div id="count" class="value">0</div>
            </div>
        </div>
        
        <div id="transactions" class="transactions" style="display: none;">
            <div class="transactions-header">
                <h2>📈 Последние операции</h2>
            </div>
            <div id="transactions-list"></div>
        </div>
        
        <div id="loading" class="loading">Загрузка данных...</div>
        <div id="error" class="error" style="display: none;"></div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
