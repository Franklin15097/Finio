version: '3.8'

services:
  # Backend API (Node.js)
  backend:
    build: ./backend
    container_name: finio_backend
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=production
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm start
    restart: unless-stopped
    networks:
      - finio_network

  # Frontend (Static files)
  frontend:
    image: nginx:alpine
    container_name: finio_frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    networks:
      - finio_network

networks:
  finio_network:
    driver: bridge