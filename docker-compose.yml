version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: finio_mysql
    environment:
      MYSQL_ROOT_PASSWORD: maks15097
      MYSQL_DATABASE: finio
      MYSQL_USER: finio_user
      MYSQL_PASSWORD: maks15097
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Backend API
  backend:
    build: ./backend
    container_name: finio_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+aiomysql://finio_user:maks15097@mysql:3306/finio
      - TELEGRAM_BOT_TOKEN=8388539678:AAH1t-XurvydCG-cZBGme0suPUt4RwMqm34
      - TELEGRAM_WEBHOOK_URL=https://studiofinance.ru
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      timeout: 10s
      retries: 5

  # Frontend
  frontend:
    build: ./frontend
    container_name: finio_frontend
    ports:
      - "3000:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      timeout: 10s
      retries: 3

  # Nginx Proxy
  nginx:
    image: nginx:alpine
    container_name: finio_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data: