version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: finio-db
    restart: always
    environment:
      POSTGRES_DB: finio
      POSTGRES_USER: finio_user
      POSTGRES_PASSWORD: maks15097
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finio_user -d finio"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: finio-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: finio
      DB_USER: finio_user
      DB_PASSWORD: maks15097
      BOT_TOKEN: ${BOT_TOKEN}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
