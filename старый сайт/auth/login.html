<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Finio</title>
    <link rel="stylesheet" href="../css/main.css">
</head>

<body class="auth-layout">
    <div class="card" style="width: 100%; max-width: 400px;">
        <div class="text-center mb-4">
            <h2 style="font-size: 1.5rem; margin-bottom: 8px;">С возвращением!</h2>
            <p style="color: var(--text-secondary);">Введите свои данные для входа</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" name="email" class="form-input" required placeholder="name@example.com">
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Пароль</label>
                <input type="password" id="password" name="password" class="form-input" required placeholder="••••••••">
            </div>

            <div id="error-msg" style="color: var(--danger); font-size: 0.9rem; margin-bottom: 1rem; display: none;">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Войти</button>
        </form>

        <div class="text-center mt-4" style="font-size: 0.9rem;">
            <p style="color: var(--text-secondary);">Нет аккаунта? <a href="register.html"
                    style="color: var(--primary-accent);">Зарегистрироваться</a></p>
        </div>
    </div>

    <script src="../js/auth.js"></script>
</body>

</html>
