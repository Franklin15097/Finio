<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Finio</title>
    <link rel="stylesheet" href="../css/main.css">
</head>

<body class="flex items-center justify-center">
    <div class="card" style="width: 100%; max-width: 400px;">
        <div class="text-center mb-4">
            <h2 style="font-size: 1.5rem; margin-bottom: 8px;">Создать аккаунт</h2>
            <p style="color: var(--text-secondary);">Начните управлять финансами сегодня</p>
        </div>

        <form id="registerForm">
            <div class="form-group">
                <label for="full_name" class="form-label">Имя</label>
                <input type="text" id="full_name" name="full_name" class="form-input" required
                    placeholder="Иван Иванов">
            </div>

            <div class="form-group">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" name="email" class="form-input" required placeholder="name@example.com">
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Пароль</label>
                <input type="password" id="password" name="password" class="form-input" required placeholder="••••••••">
                <p style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 4px;">Минимум 8 символов</p>
            </div>

            <div id="error-msg" style="color: var(--danger); font-size: 0.9rem; margin-bottom: 1rem; display: none;">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Зарегистрироваться</button>
        </form>

        <div class="text-center mt-4" style="font-size: 0.9rem;">
            <p style="color: var(--text-secondary);">Уже есть аккаунт? <a href="login.html"
                    style="color: var(--primary-accent);">Войти</a></p>
        </div>
    </div>

    <script src="../js/auth.js"></script>
</body>

</html>
