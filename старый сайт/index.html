<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finio - Умный контроль финансов</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="icon" type="image/svg+xml" href="assets/icons/logo.svg"> <!-- Placeholder icon -->
</head>
<body>
    <header style="height: var(--header-height); border-bottom: 1px solid var(--border-color);">
        <div class="container flex justify-between items-center" style="height: 100%;">
            <div class="logo" style="font-weight: 700; font-size: 1.5rem; letter-spacing: -0.05em;">
                Finio.
            </div>
            <nav>
                <a href="auth/login.html" class="btn btn-outline" style="border: none;">Войти</a>
                <a href="auth/register.html" class="btn btn-primary" style="margin-left: 10px;">Регистрация</a>
            </nav>
        </div>
    </header>

    <main class="container" style="padding-top: 80px; text-align: center;">
        <h1 style="font-size: 3.5rem; font-weight: 700; margin-bottom: 24px;">
            Управляйте финансами <br>
            <span style="color: var(--primary-accent); background: linear-gradient(90deg, #3B82F6, #60A5FA); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">с умом и стилем</span>
        </h1>
        <p style="font-size: 1.25rem; color: var(--text-secondary); max-width: 600px; margin: 0 auto 48px;">
            Простой, красивый и мощный инструмент для учета личных расходов. 
            Анализируйте бюджет, ставьте цели и достигайте финансовой свободы.
        </p>

        <div class="flex items-center justify-center gap-4">
            <a href="auth/register.html" class="btn btn-primary" style="padding: 16px 32px; font-size: 1.1rem;">Начать бесплатно</a>
            <a href="#" class="btn btn-outline" style="padding: 16px 32px; font-size: 1.1rem;">Узнать больше</a>
        </div>
        
        <!-- Mockup Placeholder -->
        <div style="margin-top: 80px; background: rgba(30,41,59,0.5); width: 100%; height: 500px; border-radius: 20px; border: 1px solid var(--border-color); display: flex; align-items: center; justify-content: center;">
            <p style="color: var(--text-secondary);">Dashboard Mockup Preview</p>
        </div>
    </main>

    <footer style="margin-top: 100px; padding: 40px 0; border-top: 1px solid var(--border-color); text-align: center; color: var(--text-secondary);">
        <p>&copy; 2026 Finio. Все права защищены.</p>
    </footer>
</body>
</html>
