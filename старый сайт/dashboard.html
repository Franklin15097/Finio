<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finio - Дашборд</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/toast.css">
    <!-- Chart.js for graphs -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <!-- Sidebar Navigation -->
    <aside class="dashboard-sidebar">
        <div class="logo">Finio.</div>
        <nav class="nav-menu">
            <a href="dashboard.html" class="nav-item active">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z" />
                </svg>
                Дашборд
            </a>
            <a href="transactions.html?type=income" class="nav-item">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                </svg>
                Доходы
            </a>
            <a href="transactions.html?type=expense" class="nav-item">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 12h-15" />
                </svg>
                Расходы
            </a>
            <a href="assets.html" class="nav-item">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 10a.5.5 0 000 1h6a.5.5 0 000-1H9z" />
                </svg>
                Счета
            </a>
            <a href="settings.html" class="nav-item">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M10.34 15.84c-.688-.06-1.386-.09-2.09-.09H7.5a4.5 4.5 0 110-9h.75c.704 0 1.402-.03 2.09-.09 1.25-.109 2.281 1.419 2.281 2.91 0 1.492-1.031 3.02-2.281 2.92zm4.12-1.78l-1.46-3.12c-.276-.588-.344-1.25-.195-1.876C12.986 8.52 13.522 8 14.168 8h.61c1.234 0 2.27.957 2.378 2.19l.716 8.216c.097 1.11-.78 1.99-1.895 1.99a2.375 2.375 0 01-1.893-2.618l.205-1.72z" />
                </svg>
                Настройки
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="user-profile">
                <div class="user-avatar" id="avatar-placeholder">U</div>
                <div style="flex-grow:1;">
                    <div id="user-name" style="font-weight:600; font-size:0.9rem;">User</div>
                    <div style="font-size:0.75rem; color:var(--text-secondary); cursor:pointer;" onclick="logout()">
                        Выйти</div>
                </div>
            </div>
        </div>
    </aside>

    <main class="dashboard-grid">
        <!-- Header Strip inside content if needed, or just Title -->
        <header class="flex justify-between items-center mb-4">
            <h1>Обзор</h1>
            <div style="color:var(--text-secondary)" id="current-date"></div>
        </header>

        <!-- Block 1: Overview Stats -->
        <section class="stats-overview">
            <div class="card stat-card">
                <div class="stat-title">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                        stroke="currentColor" style="width:20px;height:20px;color:var(--brand-primary);">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M21 12a2.25 2.25 0 00-2.25-2.25H15a3 3 0 11-6 0H5.25A2.25 2.25 0 003 12m18 0v6a2.25 2.25 0 01-2.25 2.25H5.25A2.25 2.25 0 013 18v-6m18 0V9M3 12V9m18 0a2.25 2.25 0 00-2.25-2.25H5.25A2.25 2.25 0 003 6v3" />
                    </svg>
                    Текущий баланс
                </div>
                <div class="stat-value" id="balance-amount">₽ 0.00</div>
                <div class="stat-trend" style="margin-top: 12px; font-size: 0.85rem; color: var(--text-tertiary);">
                    <span style="color: var(--success);">●</span> Активно
                </div>
            </div>
            <div class="card stat-card">
                <div class="stat-title">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                        stroke="currentColor" style="width:20px;height:20px;color:var(--success);">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M2.25 18L9 11.25l4.306 4.307a11.95 11.95 0 015.814-5.519l2.74-1.22m0 0l-5.94-2.28m5.94 2.28l-2.28 5.941" />
                    </svg>
                    Доходы
                </div>
                <div class="stat-value text-success" id="income-amount"
                    style="background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
                    ↑ ₽ 0.00</div>
                <div class="stat-trend" style="margin-top: 12px; font-size: 0.85rem; color: var(--success);">
                    +0% за месяц
                </div>
            </div>
            <div class="card stat-card">
                <div class="stat-title">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                        stroke="currentColor" style="width:20px;height:20px;color:var(--danger);">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M2.25 6L9 12.75l4.286-4.286a11.948 11.948 0 0111.818 8.818" />
                    </svg>
                    Расходы
                </div>
                <div class="stat-value text-danger" id="expense-amount"
                    style="background: var(--gradient-danger); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
                    ↓ ₽ 0.00</div>
                <div class="stat-trend" style="margin-top: 12px; font-size: 0.85rem; color: var(--danger);">
                    +0% за месяц
                </div>
            </div>
        </section>

        <!-- Block 2: Charts -->
        <section class="charts-section grid-2-1">
            <div class="card chart-card">
                <h3>Динамика расходов</h3>
                <canvas id="mainChart"></canvas>
            </div>
            <div class="card chart-card">
                <h3>Категории</h3>
                <canvas id="categoriesChart"></canvas>
            </div>
        </section>

        <!-- Block 3: Recent Transactions -->
        <section class="transactions-section">
            <div class="card">
                <div class="flex justify-between items-center mb-4">
                    <h3>Последние операции</h3>
                    <button class="btn btn-primary" onclick="openTransactionModal()">+ Добавить</button>
                </div>

                <div class="filters flex gap-4 mb-4" style="flex-wrap: wrap;">
                    <input type="text" id="search-input" placeholder="Поиск..." class="form-input"
                        style="width: auto; flex-grow: 1;">
                    <select id="filter-category" class="form-input" style="width: auto;">
                        <option value="">Все категории</option>
                    </select>
                    <input type="date" id="filter-date" class="form-input" style="width: auto;">
                </div>

                <div class="table-responsive">
                    <table class="transactions-table">
                        <thead>
                            <tr>
                                <th>Дата</th>
                                <th>Название</th>
                                <th>Категория</th>
                                <th>Сумма</th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody id="transactions-list">
                            <!-- Transactions will be loaded here -->
                            <tr>
                                <td colspan="5" class="text-center text-secondary">Загрузка...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="text-center mt-4 flex justify-center gap-4">
                    <button class="btn btn-outline btn-sm">Показать все</button>
                    <button class="btn btn-outline btn-sm" onclick="exportCSV()">Скачать CSV</button>
                </div>
            </div>
        </section>

        <!-- Block 4: Budgets (Placeholder for Phase 3) -->
        <section class="budgets-section">
            <!-- Placeholder content -->
        </section>
    </main>

    <!-- Transaction Modal -->
    <div id="transactionModal" class="modal">
        <div class="modal-content card">
            <span class="close" onclick="closeTransactionModal()">&times;</span>
            <h2 id="modalTitle">Новая транзакция</h2>
            <form id="transactionForm">
                <input type="hidden" id="trans_id" name="id">

                <div class="form-group">
                    <label class="form-label">Тип</label>
                    <div class="flex gap-4">
                        <label><input type="radio" name="type" value="expense" checked> Расход</label>
                        <label><input type="radio" name="type" value="income"> Доход</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="amount" class="form-label">Сумма</label>
                    <input type="number" id="amount" name="amount" class="form-input" step="0.01" required>
                </div>

                <div class="form-group">
                    <label for="title" class="form-label">Название</label>
                    <input type="text" id="title" name="title" class="form-input" required>
                </div>

                <div class="form-group">
                    <label for="category" class="form-label">Категория</label>
                    <select id="category" name="category_id" class="form-input">
                        <!-- Categories loaded via JS -->
                        <option value="">Без категории</option>
                        <option value="1">Еда</option> <!-- Placeholder -->
                        <option value="2">Транспорт</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="date" class="form-label">Дата</label>
                    <input type="date" id="date" name="transaction_date" class="form-input" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Сохранить</button>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script> <!-- For logout -->
    <script src="js/auth.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/transactions.js"></script>
    <script>
        // Check auth on load
        if (!localStorage.getItem('auth_token')) {
            window.location.href = 'auth/login.html';
        }
        document.getElementById('user-name').textContent = localStorage.getItem('user_name') || 'Пользователь';
        document.getElementById('avatar-placeholder').textContent = (localStorage.getItem('user_name') || 'U')[0].toUpperCase();
        document.getElementById('current-date').textContent = new Date().toLocaleDateString('ru-RU', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

        function comingSoon() { alert('Скоро будет доступно!'); }


        // Set default date to today
        document.getElementById('date').valueAsDate = new Date();
    </script>
</body>

</html>
