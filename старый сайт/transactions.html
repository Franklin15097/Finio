<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finio - Операции</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/toast.css">
</head>

<body>
    <aside class="dashboard-sidebar">
        <div class="logo">Finio.</div>
        <nav class="nav-menu">
            <a href="dashboard.html" class="nav-item">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z" />
                </svg>
                Дашборд
            </a>
            <a href="transactions.html?type=income" id="nav-income" class="nav-item">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                </svg>
                Доходы
            </a>
            <a href="transactions.html?type=expense" id="nav-expense" class="nav-item">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 12h-15" />
                </svg>
                Расходы
            </a>
            <a href="assets.html" class="nav-item">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 10a.5.5 0 000 1h6a.5.5 0 000-1H9z" />
                </svg> Счета
            </a>
            <a href="settings.html" class="nav-item">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M10.34 15.84c-.688-.06-1.386-.09-2.09-.09H7.5a4.5 4.5 0 110-9h.75c.704 0 1.402-.03 2.09-.09 1.25-.109 2.281 1.419 2.281 2.91 0 1.492-1.031 3.02-2.281 2.92zm4.12-1.78l-1.46-3.12c-.276-.588-.344-1.25-.195-1.876C12.986 8.52 13.522 8 14.168 8h.61c1.234 0 2.27.957 2.378 2.19l.716 8.216c.097 1.11-.78 1.99-1.895 1.99a2.375 2.375 0 01-1.893-2.618l.205-1.72z" />
                </svg> Настройки
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-profile">
                <div class="user-avatar" id="avatar-placeholder">U</div>
                <div style="flex-grow:1;">
                    <div id="user-name" style="font-weight:600; font-size:0.9rem;">User</div>
                    <div style="font-size:0.75rem; color:var(--text-secondary); cursor:pointer;" onclick="logout()">
                        Выйти</div>
                </div>
            </div>
        </div>
    </aside>

    <main class="dashboard-grid animate-fade-in">
        <div class="flex justify-between items-end mb-6">
            <div>
                <h1 id="page-title" style="margin-bottom: 5px;">Операции</h1>
                <p style="color:var(--text-secondary); font-size: 0.95rem;">Управляйте своими финансами</p>
            </div>

            <div class="flex gap-4">
                <!-- Stat Cards Mini -->
                <div class="card p-3 flex flex-col justify-center" style="min-width: 150px; padding: 15px;">
                    <span style="font-size:0.8rem; color:var(--text-secondary);">Всего за месяц</span>
                    <span id="header-total-amount" style="font-size:1.2rem; font-weight:700;">₽ 0</span>
                </div>

                <button class="btn btn-primary h-auto" onclick="openTransactionModal()">
                    <span style="margin-right:8px; font-size:1.2rem;">+</span> Новая запись
                </button>
            </div>
        </div>

        <!-- Top Section: Chart & Recurring -->
        <div class="grid-top mb-4" id="top-section">
            <!-- Trends Chart Section -->
            <div class="card animate-fade-in" style="animation-delay: 0.1s;">
                <div class="flex justify-between items-center mb-4">
                    <h3 id="chart-title">Динамика</h3>
                    <select id="chart-period" class="form-input"
                        style="width: auto; padding: 8px 32px 8px 12px; font-size: 0.85rem;">
                        <option value="month">Этот месяц</option>
                        <option value="year">Этот год</option>
                        <option value="all">За все время</option>
                    </select>
                </div>
                <div style="height: 250px; width: 100%;">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>

            <!-- Recurring Expenses (Moved Here) -->
            <div class="card animate-fade-in" id="recurring-block" style="display:none; animation-delay: 0.2s;">
                <div class="flex justify-between items-center mb-4">
                    <h3>Обязательные</h3>
                    <button class="btn btn-outline btn-sm" onclick="openRecurringModal()">+</button>
                </div>
                <div id="recurring-list" class="flex flex-col gap-3" style="max-height: 180px; overflow-y: auto;">
                    <!-- Items injected here -->
                </div>
                <div class="mt-3 pt-3 border-t" style="border-color:rgba(255,255,255,0.1);">
                    <div class="flex justify-between items-center">
                        <span style="color:var(--text-secondary); font-size:0.9rem;">В месяц:</span>
                        <span id="recurring-total-month" style="font-weight:bold;">₽ 0</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Grid: Transactions List (Full Width) -->
        <div class="grid-layout" id="main-layout" style="grid-template-columns: 1fr;">
            <!-- Left Column: Transactions List -->
            <div class="card">
                <div class="filters flex gap-4 mb-4" style="flex-wrap: wrap;">
                    <input type="text" id="search-input" placeholder="Поиск..." class="form-input"
                        style="width: auto; flex-grow: 1;">
                    <select id="filter-category" class="form-input" style="width: auto;">
                        <option value="">Все категории</option>
                    </select>
                    <input type="date" id="filter-date" class="form-input" style="width: auto;">
                </div>

                <div class="table-responsive">
                    <table class="transactions-table">
                        <thead>
                            <tr>
                                <th>Дата</th>
                                <th>Название</th>
                                <th>Категория</th>
                                <th>Сумма</th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody id="transactions-list">
                            <tr>
                                <td colspan="4" class="text-center text-secondary">Загрузка...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="text-center mt-4">
                    <button class="btn btn-outline btn-sm" onclick="exportCSV()">Скачать CSV</button>
                </div>
            </div>

            <!-- Recurring Block Moved to Top -->
        </div>
    </main>

    <style>
        .grid-top {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        /* When we have recurring expenses (Expense View) */
        .grid-top.split {
            grid-template-columns: 2.5fr 1fr;
        }

        @media (max-width: 900px) {
            .grid-top.split {
                grid-template-columns: 1fr;
            }
        }
    </style>

    <!-- Includes Transaction Modal from original dashboard -->
    <div id="transactionModal" class="modal">
        <div class="modal-content card animate-scale-in">
            <span class="close" onclick="closeTransactionModal()">&times;</span>
            <h2 id="modalTitle">Новая транзакция</h2>
            <form id="transactionForm">
                <input type="hidden" id="trans_id" name="id">
                <div class="form-group">
                    <label class="form-label">Тип</label>
                    <div class="flex gap-4">
                        <label><input type="radio" name="type" value="expense" checked> Расход</label>
                        <label><input type="radio" name="type" value="income"> Доход</label>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Сумма</label>
                    <input type="number" id="amount" name="amount" class="form-input" step="0.01" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Название</label>
                    <input type="text" id="title" name="title" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Категория</label>
                    <select id="category" name="category_id" class="form-input">
                        <option value="">Без категории</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Дата</label>
                    <input type="date" id="date" name="transaction_date" class="form-input" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Сохранить</button>
            </form>
        </div>
    </div>

    <!-- Recurring Expense Modal -->
    <div id="recurringModal" class="modal">
        <div class="modal-content card animate-scale-in">
            <span class="close" onclick="closeRecurringModal()">&times;</span>
            <h2>Ежемесячный платеж</h2>
            <form id="recurringForm">
                <div class="form-group">
                    <label class="form-label">Название (Аренда, Интернет)</label>
                    <input type="text" name="title" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Сумма (₽)</label>
                    <input type="number" name="amount" class="form-input" step="0.01" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Добавить</button>
            </form>
        </div>
    </div>
    <!-- Category Modal -->
    <div id="categoryModal" class="modal">
        <div class="modal-content card animate-scale-in" style="max-width: 400px;">
            <span class="close" onclick="closeCategoryModal()">&times;</span>
            <h2>Новая категория</h2>
            <form id="categoryForm">
                <div class="form-group">
                    <label class="form-label">Название</label>
                    <input type="text" name="name" class="form-input" required placeholder="Например: Такси">
                </div>
                <div class="form-group">
                    <label class="form-label">Тип</label>
                    <div class="flex gap-4">
                        <label><input type="radio" name="type" value="expense" checked> Расход</label>
                        <label><input type="radio" name="type" value="income"> Доход</label>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Создать</button>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/transactions.js"></script>
    <script>
        if (!localStorage.getItem('auth_token')) window.location.href = 'auth/login.html';
        document.getElementById('user-name').textContent = localStorage.getItem('user_name');
        document.getElementById('avatar-placeholder').textContent = (localStorage.getItem('user_name') || 'U')[0].toUpperCase();
        document.getElementById('date').valueAsDate = new Date();

        // Handle URL parameters for "Income" vs "Expense"
        const urlParams = new URLSearchParams(window.location.search);
        const typeParam = urlParams.get('type');

        if (typeParam === 'income') {
            document.querySelector('#nav-income').classList.add('active');
            document.querySelector('#nav-expense').classList.remove('active');
            document.querySelector('h1').textContent = 'Доходы';
            // Pre-select filters or filter logic if implemented
            setTimeout(() => {
                if (window.filterTransactions) window.filterTransactions('income');
            }, 500);
        } else if (typeParam === 'expense') {
            document.querySelector('#nav-expense').classList.add('active');
            document.querySelector('#nav-income').classList.remove('active');
            document.querySelector('h1').textContent = 'Расходы';
            setTimeout(() => {
                if (window.filterTransactions) window.filterTransactions('expense');
            }, 500);
        } else {
            // Default "Transactions" page (if opened directly)
            document.querySelector('h1').textContent = 'Все операции';
        }
    </script>
</body>

</html>
